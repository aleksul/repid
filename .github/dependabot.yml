version: 2
updates:
- package-ecosystem: uv
  directory: /
  schedule:
    interval: monthly
  commit-message:
    prefix: ⬆
  ignore:
  - dependency-name: google-auth
  - dependency-name: grpcio
  - dependency-name: pydantic
  - dependency-name: redis

- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: daily
  commit-message:
    prefix: ⬆
