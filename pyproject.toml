[tool.coverage]
report.fail_under = 100

[tool.black]
line-length = 100

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.mypy]
disallow_untyped_defs = true
disallow_any_unimported = true
no_implicit_optional = true
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
exclude = "^tests/"

[tool.flake8]
max-line-length = 100
per-file-ignores = "__init__.py:F401"
ignore = "S101 tests/, W503, PT013"

[tool.poetry]
name = "repid"
version = "0.2.3"
description = "Async queue for Python."
authors = ["aleksul <me@aleksul.space>"]
repository = "https://github.com/aleksul/repid"
documentation = "https://aleksul.github.io/repid"
readme = "README.md"
license = "MIT"

[tool.poetry.dependencies]
python = "^3.8"
anyio = "^3.5.0"
uvloop = "^0.16.0"
pydantic = "^1.9.0"
msgspec = "^0.6.0"
orjson = "^3.7.5"

redis = { version = "^4.3.3", optional = true }
aiokafka = { version = "^0.7.2", optional = true }
aiobotocore = { version = "^2.2.0", optional = true }
aio-pika = { version = "^7.1.2", optional = true }
nats-py = { version = "^2.1.0", optional = true }
croniter = { version = "^1.3.4", optional = true }

[tool.poetry.extras]
redis = ["redis"]
amqp = ["aio-pika"]
rabbitmq = ["aio-pika"]
activemq = ["aio-pika"]
kafka = ["aiokafka"]
amazonsqs = ["aiobotocore"]
sqs = ["aiobotocore"]
nats = ["nats-py"]
cron = ["croniter"]

[tool.poetry.dev-dependencies]
# sort
black = "^22.6.0"
isort = "^5.10.1"
# lint (mypy)
mypy = "^0.910"
types-orjson = "^3.6.2"
types-redis = "^4.3.3"
types-croniter = "^1.3.0"
# lint (flake8)
flake8 = "^4.0.1"
flake8-bugbear = "^21.11.29"
flake8-builtins = "^1.5.3"
flake8-bandit = "^3.0.0"
flake8-pep518 = "~0.1.0"
# test
pytest = "^6.2.5"
pytest-cov = "^3.0.0"
pytest-sugar = "^0.9.4"
pytest-icdiff = "^0.5"
pytest-docker-tools = "^3.1.3"
hypothesis = "^6.46.11"
dirty-equals = "^0.2.1"
time-machine = "^2.7.1"
# pre-commit
pre-commit = "^2.19.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
