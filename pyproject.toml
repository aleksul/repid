[project]
name = "repid"
version = "1.0.0"
description = "Async queue for Python."
authors = [{ name = "aleksul", email = "me@aleksul.space" }]
dependencies = ["anyio<4.0.0,>=3.5.0", "msgspec<1.0.0,>=0.7.1"]
requires-python = ">=3.8,<4.0"
readme = "README.md"
license = { text = "MIT" }

[project.urls]
repository = "https://github.com/aleksul/repid"
documentation = "https://aleksul.github.io/repid"

[project.optional-dependencies]
amqp = ["aio-pika<8.0.0,>=7.1.2"]
redis = ["redis<5.0.0,>=4.3.3"]
# kafka = ["aiokafka<1.0.0,>=0.7.2"]
# nats = ["nats-py<3.0.0,>=2.1.0"]
cron = ["croniter<2.0.0,>=1.3.4"]

[tool.pdm.dev-dependencies]
format = ["black<23.0.0,>=22.6.0", "isort<6.0.0,>=5.10.1"]
lint = [
    "mypy<0.1000,>=0.910",
    "types-orjson<4.0.0,>=3.6.2",
    "types-redis<5.0.0,>=4.3.3",
    "types-croniter<2.0.0,>=1.3.0",
    "flake8<5.0.0,>=4.0.1",
    "flake8-bugbear<22.0.0,>=21.11.29",
    "flake8-builtins<2.0.0,>=1.5.3",
    "flake8-bandit<4.0.0,>=3.0.0",
    "flake8-pep518~=0.1.0",
]
tests = [
    "pytest<7.0.0,>=6.2.5",
    "pytest-cov<4.0.0,>=3.0.0",
    "pytest-sugar<1.0.0,>=0.9.4",
    "pytest-icdiff<1.0,>=0.5",
    "pytest-docker-tools<4.0.0,>=3.1.3",
    "hypothesis<7.0.0,>=6.49.1",
    "dirty-equals<1.0.0,>=0.2.1",
    "time-machine<3.0.0,>=2.7.1",
]
pre-commit = ["pre-commit<3.0.0,>=2.19.0"]
docs = ["mkdocs-material>=8.3.9", "mike>=1.1.2"]

[tool.coverage]
report.fail_under = 100

[tool.black]
line-length = 100

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.mypy]
disallow_untyped_defs = true
disallow_any_unimported = true
no_implicit_optional = true
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true
exclude = "^tests/"

[tool.pyright]
ignore = ["repid/data.py"]

[tool.flake8]
max-line-length = 100
per-file-ignores = "__init__.py:F401"
ignore = "S101 tests/, W503, PT013"

[tool.pdm.build]
package-dir = "repid"

[build-system]
requires = ["pdm-pep517>=1.0.0"]
build-backend = "pdm.pep517.api"
